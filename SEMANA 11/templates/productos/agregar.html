{% extends "base.html" %}

{% block content %}
<h1><i class="bi bi-plus-circle"></i> Agregar Producto</h1>

<form method="POST">
    <div class="mb-3">
        <label for="codigo" class="form-label"><i class="bi bi-barcode"></i> Código</label>
        <input type="text" class="form-control" id="codigo" name="codigo" required>
    </div>
    
    <div class="mb-3">
        <label for="nombre" class="form-label"><i class="bi bi-tag"></i> Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required>
    </div>
    
    <div class="mb-3">
        <label for="descripcion" class="form-label"><i class="bi bi-textarea-t"></i> Descripción</label>
        <textarea class="form-control" id="descripcion" name="descripcion" rows="3"></textarea>
    </div>
    
    <div class="mb-3">
        <label for="categoria" class="form-label"><i class="bi bi-grid"></i> Categoría</label>
        <input type="text" class="form-control" id="categoria" name="categoria" required>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="precio_compra" class="form-label"><i class="bi bi-currency-dollar"></i> Precio de Compra</label>
            <input type="number" step="0.01" class="form-control" id="precio_compra" name="precio_compra" required>
        </div>
        
        <div class="col-md-6 mb-3">
            <label for="precio_venta" class="form-label"><i class="bi bi-currency-dollar"></i> Precio de Venta</label>
            <input type="number" step="0.01" class="form-control" id="precio_venta" name="precio_venta" required>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="stock" class="form-label"><i class="bi bi-box"></i> Stock</label>
            <input type="number" class="form-control" id="stock" name="stock" required>
        </div>
        
        <div class="col-md-6 mb-3">
            <label for="stock_minimo" class="form-label"><i class="bi bi-exclamation-triangle"></i> Stock Mínimo</label>
            <input type="number" class="form-control" id="stock_minimo" name="stock_minimo" required value="10">
        </div>
    </div>
    
    <div class="mb-3">
        <label for="unidad_medida" class="form-label"><i class="bi bi-rulers"></i> Unidad de Medida</label>
        <select class="form-select" id="unidad_medida" name="unidad_medida" required>
            <option value="unidad" selected>Unidad</option>
            <option value="paquete">Paquete</option>
            <option value="caja">Caja</option>
            <option value="kg">Kilogramo</option>
            <option value="metro">Metro</option>
        </select>
    </div>
    
    <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-circle"></i> Guardar Producto
    </button>
    <a href="{{ url_for('listar_productos') }}" class="btn btn-secondary">
        <i class="bi bi-x-circle"></i> Cancelar
    </a>
</form>
{% endblock %}
